# hyprlock -- lock screen (still uses hyprlang syntax, not Lua).
# Catppuccin Latte, to match the ghostty / starship theme.

background {
    monitor =
    color = rgb(eff1f5)
}

input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.3
    outer_color = rgb(1e66f5)
    inner_color = rgb(e6e9ef)
    font_color = rgb(4c4f69)
    fade_on_empty = false
    placeholder_text = <span foreground="##6c6f85">Password</span>
    fail_color = rgb(d20f39)
    check_color = rgb(df8e1d)
    position = 0, -20
    halign = center
    valign = center
}

# 24-hour clock, parity with scripts/gnome.
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgb(4c4f69)
    font_size = 64
    font_family = Hack Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgb(6c6f85)
    font_size = 18
    font_family = Hack Nerd Font
    position = 0, 0
    halign = center
    valign = center
}
